services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sunflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sun_uw}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sunflow-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  supertokens:
    image: supertokens/supertokens-postgresql:latest
    container_name: sunflow-supertokens
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_CONNECTION_URI: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sun_uw}"
      API_KEYS: "${SUPERTOKENS_API_KEY:?SUPERTOKENS_API_KEY is required}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3567/hello"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Migrations (runs once and exits) ────────────────────────────────────────
  migrate:
    image: sunflow-app:latest
    container_name: sunflow-migrate
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sun_uw}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ─── Application ─────────────────────────────────────────────────────────────
  app:
    image: sunflow-app:latest
    container_name: sunflow-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      supertokens:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000

      # Application
      NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-SunFlowCRM}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}"
      NEXT_PUBLIC_API_DOMAIN: "${NEXT_PUBLIC_APP_URL}"

      # Auth provider
      AUTH_PROVIDER: "${AUTH_PROVIDER:-supertokens}"
      NEXT_PUBLIC_AUTH_PROVIDER: "${AUTH_PROVIDER:-supertokens}"

      # SuperTokens
      SUPERTOKENS_CONNECTION_URI: "http://supertokens:3567"
      SUPERTOKENS_API_KEY: "${SUPERTOKENS_API_KEY}"

      # Database
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sun_uw}"

      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"

      # Worker secret
      INTERNAL_WORKER_SECRET: "${INTERNAL_WORKER_SECRET:?INTERNAL_WORKER_SECRET is required}"

      # Sentry (optional)
      NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
      NEXT_PUBLIC_SENTRY_ORG: "${NEXT_PUBLIC_SENTRY_ORG:-}"
      NEXT_PUBLIC_SENTRY_PROJECT: "${NEXT_PUBLIC_SENTRY_PROJECT:-}"
      SENTRY_AUTH_TOKEN: "${SENTRY_AUTH_TOKEN:-}"
      NEXT_PUBLIC_SENTRY_DISABLED: "${NEXT_PUBLIC_SENTRY_DISABLED:-true}"

  # ─── Background worker ────────────────────────────────────────────────────────
  worker:
    image: sunflow-app:latest
    container_name: sunflow-worker
    restart: unless-stopped
    command: ["npx", "tsx", "workers/notifications-worker.ts"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production

      # Database
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sun_uw}"

      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"

      # Worker secret
      INTERNAL_WORKER_SECRET: "${INTERNAL_WORKER_SECRET}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL}"

volumes:
  postgres_data:
  redis_data:
